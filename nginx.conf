# ==========================================
# CareCircle AI - Nginx Production Configuration Template
# Save this file to /etc/nginx/sites-available/carecircle on your VPS
# ==========================================

# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name admin.sisganadero.online;

    return 301 https://$host$request_uri;
}

# HTTPS - Serve Frontend and Backend on the same domain
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.sisganadero.online;

    # SSL Certificates (Managed by Certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/admin.sisganadero.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.sisganadero.online/privkey.pem;
    
    # Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Backend API Proxy (Route: /api/ -> Fastify port 3011)
    # The frontend is configured with VITE_API_URL=https://yourdomain.com/api
    # This rewrite removes the "/api" prefix before sending the request to Fastify
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for real-time E-Ink sync and telemetry
        proxy_buffering off;
    }

    # Frontend TanStack Start SSR Proxy (Route: / -> Vite/Nitro port 3010)
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Standard caching for static files handled by Nitro
        proxy_cache_bypass $http_upgrade;
    }

    # Additional security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
}
